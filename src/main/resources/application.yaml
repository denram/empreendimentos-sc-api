spring:
  application:
    name: empreendimentos-sc-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/empreendimentos_sc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration